spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: insurance-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/insurance/**

