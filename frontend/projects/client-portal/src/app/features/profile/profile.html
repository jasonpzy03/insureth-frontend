<div class="flex justify-center p-6">
  <nz-card nzTitle="User Profile" [nzBordered]="false" class="w-full max-w-[600px] rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
    <nz-spin [nzSpinning]="isLoading">
      <div class="flex items-center gap-5 mb-6">
        <div class="flex items-center justify-center w-16 h-16 bg-gray-100 rounded-full text-[32px] text-primary">
          <span nz-icon nzType="user" nzTheme="outline"></span>
        </div>
        <div>
          <h2 nz-typography class="m-0">{{ shortAddress }}</h2>
          <p nz-typography nzType="secondary">Connected via MetaMask</p>
        </div>
      </div>

      <nz-divider nzText="Account Details" nzOrientation="left"></nz-divider>

      <form nz-form [formGroup]="profileForm" nzLayout="vertical" (ngSubmit)="submit()" class="mb-4">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="username">Username</nz-form-label>
          <nz-form-control nzErrorTip="Please input your username!">
            <nz-input-group nzPrefixIcon="user">
              <input type="text" nz-input formControlName="username" id="username" placeholder="Username" />
            </nz-input-group>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired nzFor="email">Email</nz-form-label>
          <nz-form-control nzErrorTip="Please input a valid email address!">
            <nz-input-group nzPrefixIcon="mail">
              <input type="email" nz-input formControlName="email" id="email" placeholder="Email" />
            </nz-input-group>
          </nz-form-control>
        </nz-form-item>

        <div class="flex justify-between items-center mt-6">
          <button nz-button nzType="primary" nzSize="large" class="rounded-md" [nzLoading]="isSaving">
            <span nz-icon nzType="save"></span> Save Changes
          </button>
          
          <button type="button" nz-button nzType="default" nzDanger (click)="logout()" nzSize="large" class="rounded-md">
            <span nz-icon nzType="logout"></span> Logout
          </button>
        </div>
      </form>
    </nz-spin>
  </nz-card>
</div>
