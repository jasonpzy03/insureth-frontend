<nz-header class="bg-white px-6">
  <div class="flex items-center justify-between w-full h-full">
    <div class="flex items-center flex-1">
      <div class="mr-12">
        <a routerLink="/" class="flex justify-center items-center no-underline gap-2">
          <img src="/logo.png" alt="Insureth Logo" class="w-[32px] h-[32px]">
          <h1 class="text-[20px] font-bold m-0">Insureth</h1>
        </a>
      </div>

      <ul nz-menu class="!bg-transparent leading-[64px] border-b-0" nzMode="horizontal"
        *ngIf="walletService.isAuthenticated() && walletService.isProfileComplete()">
        <li nz-menu-item routerLinkActive="ant-menu-item-selected" routerLink="/dashboard">Dashboard</li>
        <li nz-submenu [nzTitle]="insuranceMenuTitle" class="no-underline-tab">
          <ul>
            <li nz-menu-item routerLink="/insurance/flight-insurance">
              <span nz-icon nzType="rocket" nzTheme="outline"></span>
              Flight Insurance
            </li>
          </ul>
        </li>
        <ng-template #insuranceMenuTitle>
          <span class="flex items-center gap-1">
            Insurance <span nz-icon nzType="down" class="text-[10px] opacity-70"></span>
          </span>
        </ng-template>
        <li nz-submenu [nzTitle]="investorMenuTitle" class="no-underline-tab">
          <ul>
            <li nz-menu-item routerLink="/investor/dashboard">
              <span nz-icon nzType="dashboard" nzTheme="outline"></span>
              Analytics Dashboard
            </li>
            <li nz-menu-item routerLink="/investor/pools">
              <span nz-icon nzType="bank" nzTheme="outline"></span>
              Liquidity Pools
            </li>
          </ul>
        </li>
        <ng-template #investorMenuTitle>
          <span class="flex items-center gap-1">
            Investors <span nz-icon nzType="down" class="text-[10px] opacity-70"></span>
          </span>
        </ng-template>

        <li nz-menu-item routerLinkActive="ant-menu-item-selected" routerLink="/policies">Policies</li>
        <li nz-menu-item routerLinkActive="ant-menu-item-selected" routerLink="/profile">Profile</li>
      </ul>
    </div>

    <div class="flex items-center">
      <ng-container *ngIf="walletService.isAuthenticated(); else loginBtn">
        <button nz-button nzType="text" nz-dropdown [nzDropdownMenu]="userMenu" nzTrigger="click"
          class="flex items-center gap-2 px-3 transition-all border border-gray-200 rounded-md h-9 text-gray-500 hover:border-primary hover:text-primary hover:bg-primary-bg">
          <span class="font-mono text-[13px]">{{ shortAddress }}</span>
          <span nz-icon nzType="down"></span>
        </button>
        <nz-dropdown-menu #userMenu="nzDropdownMenu">
          <ul nz-menu class="overflow-hidden">
            <li nz-menu-item routerLink="/profile" *ngIf="walletService.isProfileComplete()">
              <span nz-icon nzType="user"></span> My Profile
            </li>
            <li nz-divider *ngIf="walletService.isProfileComplete()"></li>
            <li nz-menu-item (click)="logout()" class="!text-red-500 hover:!bg-red-50">
              <span nz-icon nzType="logout"></span> Disconnect
            </li>
          </ul>
        </nz-dropdown-menu>
      </ng-container>

      <ng-template #loginBtn>
        <button nz-button nzType="primary" routerLink="/login"
          class="font-semibold rounded-md bg-primary border-primary hover:bg-primary-hover hover:border-primary-hover"
          *ngIf="!isLoginPage">
          Connect Wallet
        </button>
      </ng-template>
    </div>
  </div>
</nz-header>
