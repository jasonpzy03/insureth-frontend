<div class="insurance-admin-shell">
  <div class="insurance-admin-intro">
    <p class="insurance-admin-subtitle">Review airlines available in the insurance catalog and decide which ones are supported.</p>
  </div>

  <nz-card class="insurance-admin-card">
    <div class="insurance-admin-toolbar">
      <input
        nz-input
        [(ngModel)]="search"
        (keyup.enter)="applySearch()"
        placeholder="Search airline name, IATA, or ICAO"
        class="insurance-admin-search">
      <button nz-button nzType="default" (click)="applySearch()" [disabled]="isLoading()" [nzLoading]="isLoading()">
        Search
      </button>
      <button 
        nz-button 
        nzType="default" 
        (click)="syncAirlines()" 
        [disabled]="isSyncing()" 
        [nzLoading]="isSyncing()"
        class="insurance-admin-sync">
        <i nz-icon nzType="sync"></i>
        Sync with Airlabs
      </button>
    </div>

    <nz-table
      [nzData]="items()"
      [nzLoading]="isLoading()"
      [nzFrontPagination]="false"
      [nzTotal]="total()"
      [nzPageIndex]="pageIndex"
      [nzPageSize]="pageSize"
      [nzShowSizeChanger]="true"
      [nzPageSizeOptions]="pageSizeOptions"
      (nzQueryParams)="onQueryParamsChange({ pageIndex: $event.pageIndex, pageSize: $event.pageSize })">
      <thead>
        <tr>
          <th>Name</th>
          <th>IATA</th>
          <th>ICAO</th>
          <th>Supported</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let airline of items()">
          <td>{{ airline.name }}</td>
          <td>{{ airline.iataCode }}</td>
          <td>{{ airline.icaoCode }}</td>
          <td>{{ airline.supportedForFlightInsurance ? 'Yes' : 'No' }}</td>
          <td>
            <button nz-button nzType="link" (click)="openAirline(airline.airlineId)">Manage</button>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </nz-card>
</div>
