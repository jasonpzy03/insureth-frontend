<div class="insurance-detail-shell">
  <nz-card class="insurance-detail-card" [nzLoading]="isLoading()">
    <div class="insurance-detail-header">
      <div>
        <span class="insurance-detail-eyebrow">Flight Insurance</span>
        <h2>Airline Support</h2>
      </div>
      <button nz-button nzType="default" routerLink="/insurance-config/flight-insurance/airlines">Back</button>
    </div>

    <nz-alert *ngIf="error()" nzType="error" [nzMessage]="error() || ''" nzShowIcon></nz-alert>

    <form nz-form [formGroup]="form" class="insurance-detail-form">
      <nz-form-item>
        <nz-form-label [nzSpan]="24">Airline Name</nz-form-label>
        <nz-form-control [nzSpan]="24"><input nz-input formControlName="name"></nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="24">IATA Code</nz-form-label>
        <nz-form-control [nzSpan]="24"><input nz-input formControlName="iataCode"></nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="24">ICAO Code</nz-form-label>
        <nz-form-control [nzSpan]="24"><input nz-input formControlName="icaoCode"></nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="24">Supported For Flight Insurance</nz-form-label>
        <nz-form-control [nzSpan]="24"><nz-switch formControlName="supportedForFlightInsurance"></nz-switch></nz-form-control>
      </nz-form-item>
      <button nz-button nzType="primary" type="button" (click)="save()" [disabled]="isSaving()" [nzLoading]="isSaving()">Save</button>
    </form>
  </nz-card>
</div>
